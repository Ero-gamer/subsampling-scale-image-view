name: Auto Apply Patch

on:
  push:
    paths:
      - '**.patch'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Apply and Commit Claude Patch
        run: |
          PATCH_FILES=$(ls *.patch 2>/dev/null || true)
          
          if [ -n "$PATCH_FILES" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            for patch in $PATCH_FILES; do
              echo "Processing patch file: $patch..."
              
              git apply "$patch" || {
                echo "Standard patch failed. Attempting forced full-file overwrite..."
                git apply --reject --whitespace=fix "$patch" || true
              }
              
              rm -f *.rej
              rm "$patch"
            done
            
            # Stage changes, commit the resulting code updates, and push back to branch
            git add .
            git commit -m "Automated patch application (handling diffs and full overwrites)"
            git push origin ${{ github.ref_name }}
          else
            echo "No .patch files found."
          fi
